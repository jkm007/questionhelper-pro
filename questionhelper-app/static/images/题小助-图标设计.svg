<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79B8FF;stop-opacity:1" />
    </linearGradient>

    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)"/>

  <!-- 内部白色圆形 -->
  <circle cx="256" cy="256" r="180" fill="white" opacity="0.15"/>

  <!-- Q 字母 - 代表 Question -->
  <g transform="translate(256, 220)">
    <!-- Q 的圆形部分 -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>

    <!-- Q 的尾巴 -->
    <line x1="50" y1="50" x2="90" y2="90" stroke="white" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- H 字母 - 代表 Helper -->
  <g transform="translate(256, 340)">
    <!-- H 的左边竖线 -->
    <line x1="-30" y1="-25" x2="-30" y2="25" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- H 的右边竖线 -->
    <line x1="30" y1="-25" x2="30" y2="25" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- H 的中间横线 -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- 装饰元素 - 小星星 -->
  <g fill="#FFD700" opacity="0.8">
    <!-- 左上角星星 -->
    <polygon points="80,80 85,95 100,95 88,105 92,120 80,112 68,120 72,105 60,95 75,95" transform="scale(0.8)"/>

    <!-- 右上角星星 -->
    <polygon points="432,80 437,95 452,95 440,105 444,120 432,112 420,120 424,105 412,95 427,95" transform="scale(0.8)"/>
  </g>

  <!-- 书本图标 - 装饰 -->
  <g transform="translate(380, 150) rotate(15)" fill="white" opacity="0.6">
    <rect x="-15" y="-20" width="30" height="40" rx="3" ry="3"/>
    <line x1="-10" y1="-12" x2="10" y2="-12" stroke="url(#bgGradient)" stroke-width="2"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="url(#bgGradient)" stroke-width="2"/>
    <line x1="-10" y1="4" x2="5" y2="4" stroke="url(#bgGradient)" stroke-width="2"/>
  </g>
</svg>