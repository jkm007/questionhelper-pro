<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- 装饰圆形 -->
  <circle cx="256" cy="256" r="180" fill="white" opacity="0.08"/>
  <circle cx="256" cy="256" r="140" fill="white" opacity="0.05"/>

  <!-- Q 字母 - 代表 Question -->
  <g transform="translate(180, 200)">
    <!-- Q 的圆形部分 -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>

    <!-- Q 的尾巴 -->
    <line x1="40" y1="40" x2="75" y2="75" stroke="white" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- H 字母 - 代表 Helper -->
  <g transform="translate(340, 280)">
    <!-- H 的左边竖线 -->
    <line x1="-25" y1="-30" x2="-25" y2="30" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- H 的右边竖线 -->
    <line x1="25" y1="-30" x2="25" y2="30" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- H 的中间横线 -->
    <line x1="-25" y1="0" x2="25" y2="0" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- 装饰元素 - 小星星 -->
  <g fill="#FFD700" opacity="0.9">
    <!-- 左上角星星 -->
    <polygon points="100,100 108,120 130,120 112,132 120,152 100,140 80,152 88,132 70,120 92,120" transform="scale(0.7)"/>

    <!-- 右上角星星 -->
    <polygon points="412,100 420,120 442,120 424,132 432,152 412,140 392,152 400,132 382,120 404,120" transform="scale(0.7)"/>

    <!-- 右下角小星星 -->
    <polygon points="420,380 425,390 435,390 427,396 430,406 420,400 410,406 413,396 405,390 415,390" transform="scale(0.6)"/>
  </g>

  <!-- 书本图标 - 左下角装饰 -->
  <g transform="translate(140, 380) rotate(-10)" fill="white" opacity="0.4">
    <rect x="-20" y="-25" width="40" height="50" rx="4" ry="4"/>
    <line x1="-14" y1="-15" x2="14" y2="-15" stroke="url(#bgGradient)" stroke-width="3"/>
    <line x1="-14" y1="-5" x2="14" y2="-5" stroke="url(#bgGradient)" stroke-width="3"/>
    <line x1="-14" y1="5" x2="8" y2="5" stroke="url(#bgGradient)" stroke-width="3"/>
  </g>
</svg>