<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>

    <!-- 脸部渐变 -->
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>

    <!-- 帽子渐变 -->
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGradient)"/>

  <!-- 装饰圆形 -->
  <circle cx="256" cy="256" r="200" fill="white" opacity="0.08"/>

  <!-- 题小助 IP 形象 -->

  <!-- 身体 -->
  <ellipse cx="256" cy="350" rx="80" ry="60" fill="white" opacity="0.9"/>

  <!-- 脸部 -->
  <circle cx="256" cy="250" r="85" fill="url(#faceGradient)" stroke="#E8B88A" stroke-width="3"/>

  <!-- 眼睛 -->
  <g fill="#333">
    <!-- 左眼 -->
    <ellipse cx="225" cy="240" rx="12" ry="14"/>
    <circle cx="228" cy="235" r="4" fill="white"/>

    <!-- 右眼 -->
    <ellipse cx="287" cy="240" rx="12" ry="14"/>
    <circle cx="290" cy="235" r="4" fill="white"/>
  </g>

  <!-- 眉毛 -->
  <g stroke="#666" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 210 225 Q 225 218 240 225"/>
    <path d="M 272 225 Q 287 218 302 225"/>
  </g>

  <!-- 鼻子 -->
  <ellipse cx="256" cy="260" rx="6" ry="5" fill="#E8A87C"/>

  <!-- 嘴巴 - 微笑 -->
  <path d="M 235 278 Q 256 295 277 278" stroke="#E88B6B" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <circle cx="210" cy="270" r="12" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="302" cy="270" r="12" fill="#FFB6C1" opacity="0.5"/>

  <!-- 学士帽 -->
  <g transform="translate(256, 170)">
    <!-- 帽子底座 -->
    <rect x="-60" y="-15" width="120" height="20" rx="5" fill="url(#hatGradient)"/>

    <!-- 帽子顶部 -->
    <rect x="-45" y="-35" width="90" height="25" rx="8" fill="url(#hatGradient)"/>

    <!-- 帽穗 -->
    <line x1="0" y1="-35" x2="0" y2="-65" stroke="#FFD700" stroke-width="4"/>
    <circle cx="0" cy="-68" r="6" fill="#FFD700"/>
  </g>

  <!-- 左手 - 招手 -->
  <g transform="translate(170, 320)">
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="white" stroke="#E8B88A" stroke-width="2"/>
    <!-- 手指 -->
    <ellipse cx="-8" cy="-12" rx="5" ry="8" fill="white" stroke="#E8B88A" stroke-width="1.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="8" fill="white" stroke="#E8B88A" stroke-width="1.5"/>
    <ellipse cx="8" cy="-12" rx="5" ry="8" fill="white" stroke="#E8B88A" stroke-width="1.5" transform="rotate(15)"/>
  </g>

  <!-- 右手 - 拿书 -->
  <g transform="translate(340, 310)">
    <!-- 书本 -->
    <rect x="-25" y="-18" width="50" height="40" rx="4" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-20" y1="10" x2="10" y2="10" stroke="white" stroke-width="2"/>

    <!-- 手 -->
    <ellipse cx="0" cy="25" rx="18" ry="14" fill="white" stroke="#E8B88A" stroke-width="2"/>
  </g>

  <!-- QH 文字标识 -->
  <g transform="translate(256, 440)" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="36" text-anchor="middle">
    <text x="0" y="0">题小助</text>
  </g>
</svg>