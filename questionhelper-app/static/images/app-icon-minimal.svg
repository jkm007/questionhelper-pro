<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGradient)"/>

  <!-- QH 文字 - 极简设计 -->
  <g fill="white" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="700" text-anchor="middle">
    <!-- Q -->
    <text x="195" y="300" font-size="180">Q</text>

    <!-- 分隔点 -->
    <circle cx="256" cy="270" r="8" fill="white" opacity="0.6"/>

    <!-- H -->
    <text x="320" y="300" font-size="180">H</text>
  </g>

  <!-- 装饰元素 - 小书本 -->
  <g transform="translate(400, 130) rotate(15)" fill="white" opacity="0.3">
    <rect x="-15" y="-20" width="30" height="40" rx="3"/>
    <line x1="-10" y1="-12" x2="10" y2="-12" stroke="url(#bgGradient)" stroke-width="2"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="url(#bgGradient)" stroke-width="2"/>
    <line x1="-10" y1="4" x2="5" y2="4" stroke="url(#bgGradient)" stroke-width="2"/>
  </g>

  <!-- 装饰元素 - 小星星 -->
  <g fill="#FFD700" opacity="0.6">
    <polygon points="120,120 125,135 140,135 128,145 132,160 120,152 108,160 112,145 100,135 115,135" transform="scale(0.8)"/>
  </g>
</svg>