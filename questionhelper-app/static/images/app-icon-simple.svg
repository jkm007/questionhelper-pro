<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGradient)"/>

  <!-- Q 字母 - 代表 Question -->
  <g transform="translate(175, 230)">
    <!-- Q 的圆形部分 -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="white" stroke-width="32" stroke-linecap="round"/>

    <!-- Q 的尾巴 -->
    <line x1="50" y1="50" x2="95" y2="95" stroke="white" stroke-width="32" stroke-linecap="round"/>
  </g>

  <!-- H 字母 - 代表 Helper -->
  <g transform="translate(350, 300)">
    <!-- H 的左边竖线 -->
    <line x1="-30" y1="-40" x2="-30" y2="40" stroke="white" stroke-width="28" stroke-linecap="round"/>

    <!-- H 的右边竖线 -->
    <line x1="30" y1="-40" x2="30" y2="40" stroke="white" stroke-width="28" stroke-linecap="round"/>

    <!-- H 的中间横线 -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="white" stroke-width="28" stroke-linecap="round"/>
  </g>
</svg>