<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>

    <!-- 脸部渐变 -->
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDAB9;stop-opacity:1" />
    </linearGradient>

    <!-- 帽子渐变 -->
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>

  <!-- 装饰圆形 -->
  <circle cx="256" cy="256" r="200" fill="white" opacity="0.08"/>

  <!-- 题小助 IP 形象 (简化版) -->

  <!-- 脸部 -->
  <circle cx="256" cy="260" r="90" fill="url(#faceGradient)" stroke="#E8B88A" stroke-width="3"/>

  <!-- 眼睛 -->
  <g fill="#333">
    <!-- 左眼 -->
    <ellipse cx="225" cy="250" rx="12" ry="14"/>
    <circle cx="228" cy="245" r="4" fill="white"/>

    <!-- 右眼 -->
    <ellipse cx="287" cy="250" rx="12" ry="14"/>
    <circle cx="290" cy="245" r="4" fill="white"/>
  </g>

  <!-- 眉毛 -->
  <g stroke="#666" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 210 235 Q 225 228 240 235"/>
    <path d="M 272 235 Q 287 228 302 235"/>
  </g>

  <!-- 鼻子 -->
  <ellipse cx="256" cy="270" rx="6" ry="5" fill="#E8A87C"/>

  <!-- 嘴巴 - 微笑 -->
  <path d="M 235 288 Q 256 305 277 288" stroke="#E88B6B" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <circle cx="210" cy="280" r="12" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="302" cy="280" r="12" fill="#FFB6C1" opacity="0.5"/>

  <!-- 学士帽 -->
  <g transform="translate(256, 180)">
    <!-- 帽子底座 -->
    <rect x="-60" y="-15" width="120" height="20" rx="5" fill="url(#hatGradient)"/>

    <!-- 帽子顶部 -->
    <rect x="-45" y="-35" width="90" height="25" rx="8" fill="url(#hatGradient)"/>

    <!-- 帽穗 -->
    <line x1="0" y1="-35" x2="0" y2="-65" stroke="#FFD700" stroke-width="4"/>
    <circle cx="0" cy="-68" r="6" fill="#FFD700"/>
  </g>

  <!-- 左手 - 招手 -->
  <g transform="translate(160, 310)">
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="white" stroke="#E8B88A" stroke-width="2"/>
    <!-- 手指 -->
    <ellipse cx="-6" cy="-10" rx="4" ry="7" fill="white" stroke="#E8B88A" stroke-width="1.5" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="7" fill="white" stroke="#E8B88A" stroke-width="1.5"/>
    <ellipse cx="6" cy="-10" rx="4" ry="7" fill="white" stroke="#E8B88A" stroke-width="1.5" transform="rotate(15)"/>
  </g>

  <!-- 右手 - 拿书 -->
  <g transform="translate(350, 300)">
    <!-- 书本 -->
    <rect x="-22" y="-15" width="44" height="35" rx="4" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
    <line x1="-18" y1="-8" x2="18" y2="-8" stroke="white" stroke-width="2"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-18" y1="8" x2="8" y2="8" stroke="white" stroke-width="2"/>

    <!-- 手 -->
    <ellipse cx="0" cy="22" rx="16" ry="12" fill="white" stroke="#E8B88A" stroke-width="2"/>
  </g>
</svg>