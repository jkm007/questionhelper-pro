        type: integer
      require_approval:
        description: 需要审批
        type: boolean
    type: object
  dto.ClearCacheRequest:
    properties:
      pattern:
        description: 为空则清除全部，支持通配符
        type: string
    type: object
  dto.CommentInfo:
    properties:
      children:
        items:
          $ref: '#/definitions/dto.CommentInfo'
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      images:
        type: string
      is_featured:
        type: boolean
      is_official:
        type: boolean
      is_pinned:
        type: boolean
      like_count:
        type: integer
      mentions:
        type: string
      parent_id:
        type: integer
      reply_to_user_id:
        type: integer
      reply_to_user_name:
        type: string
      status:
        type: integer
      target_id:
        type: integer
      target_type:
        type: integer
      user_avatar:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  dto.CommentStats:
    properties:
      daily_stats:
        items:
          $ref: '#/definitions/dto.DailyCommentStat'
        type: array
      hidden_count:
        type: integer
      pending_count:
        type: integer
      report_count:
        type: integer
      today_count:
        type: integer
      top_target_stats:
        items:
          $ref: '#/definitions/dto.TargetCommentStat'
        type: array
      total_count:
        type: integer
    type: object
  dto.CompleteDailyRequest:
    properties:
      correct_count:
        minimum: 0
        type: integer
      duration:
        type: integer
      question_count:
        minimum: 1
        type: integer
    required:
    - question_count
    type: object
  dto.CopyPaperRequest:
    properties:
      title:
        maxLength: 200
        type: string
    type: object
  dto.CorrectionInfo:
    properties:
      admin_reply:
        type: string
      correction_type:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      processed_at:
        type: string
      processed_by:
        type: integer
      question_id:
        type: integer
      reward:
        type: integer
      screenshot:
        type: string
      status:
        type: integer
      user_id:
        type: integer
    type: object
  dto.CreateAlertRuleRequest:
    properties:
      condition:
        description: 条件
        enum:
        - gt
        - lt
        - eq
        - gte
        - lte
        type: string
      duration:
        description: 持续时间(分钟)
        type: integer
      metric_name:
        description: 指标名
        maxLength: 100
        type: string
      name:
        maxLength: 100
        type: string
      notify_type:
        description: 通知方式
        enum:
        - system
        - email
        - sms
        type: string
      threshold:
        description: 阈值
        type: number
