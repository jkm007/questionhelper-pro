    - confirmPassword
    - newPassword
    - oldPassword
    type: object
  dto.ChannelInfo:
    properties:
      config:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
      type:
        type: string
      updated_at:
        type: string
    type: object
  dto.ChannelStatItem:
    properties:
      channel:
        type: string
      count:
        type: integer
    type: object
  dto.CheckinRequest:
    properties:
      duration:
        type: integer
      question_count:
        type: integer
    type: object
  dto.ClassSettings:
    properties:
      allow_self_join:
        description: 允许自主加入
        type: boolean
      class_code_length:
        description: 班级码长度
        type: integer
      default_class_type:
