      name:
        maxLength: 200
        type: string
      plan_type:
        enum:
        - 1
        - 2
        - 3
        type: integer
      question_type:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
      start_date:
        type: string
      total_target:
        minimum: 1
        type: integer
