    - duration
    - level
    - name
    - notify_type
    - threshold
    type: object
  dto.AnswerRequest:
    properties:
      answer:
        type: string
      question_id:
        type: integer
    required:
    - answer
    - question_id
    type: object
  dto.ApplicationInfo:
    properties:
      created_at:
        type: string
      id:
        type: integer
      nickname:
        type: string
      reason:
        type: string
      review_note:
        type: string
      reviewed_at:
        type: string
      reviewed_by:
        type: integer
      reviewer:
        type: string
      role_id:
        type: integer
