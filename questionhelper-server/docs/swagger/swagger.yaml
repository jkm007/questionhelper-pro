    - ids
    - status
    type: object
  dto.BatchCommentDeleteRequest:
    properties:
      ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - ids
    type: object
  dto.BatchDeleteRequest:
    properties:
      ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - ids
    type: object
  dto.BatchError:
    properties:
      id:
        type: integer
      reason:
        type: string
    type: object
  dto.BatchMoveRequest:
    properties:
      category_id:
        type: integer
