    - channel
    - content
    - target_type
    - title
    - type
    type: object
  dto.BatchSendResponse:
    properties:
      batch_id:
        type: string
      failed:
        type: integer
      success:
        type: integer
      total:
        type: integer
    type: object
  dto.BatchStatusRequest:
    properties:
      ids:
        items:
          type: integer
        minItems: 1
        type: array
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - ids
    - status
    type: object
  dto.BindEmailRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  dto.BindPhoneRequest:
    properties:
      code:
        type: string
      phone:
        type: string
    required:
    - code
    - phone
    type: object
  dto.BlacklistInfo:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      operator_id:
        type: integer
      reason:
        type: string
      target_id:
        type: integer
      target_type:
        type: integer
      user_avatar:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  dto.CategoryInfo:
    properties:
      children:
        items:
          $ref: '#/definitions/dto.CategoryInfo'
        type: array
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
    type: object
  dto.CategoryStats:
    properties:
      category_id:
        type: integer
      category_name:
        type: string
      count:
        type: integer
      rate:
        type: number
    type: object
