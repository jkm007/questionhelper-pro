    properties:
      errors:
        items:
          $ref: '#/definitions/dto.BatchError'
        type: array
      failed:
        type: integer
      success:
        type: integer
      total:
        type: integer
    type: object
  dto.BatchRoleRequest:
    properties:
      ids:
        items:
          type: integer
        minItems: 1
        type: array
      role_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - ids
    - role_ids
    type: object
  dto.BatchSendRequest:
    properties:
      channel:
        enum:
        - app
        - email
        - sms
        - wechat
        type: string
      content:
        type: string
      target_ids:
        description: 角色ID/班级ID/用户组ID列表，target_type=all时可为空
        items:
          type: integer
        type: array
      target_type:
        enum:
        - all
        - role
        - class
        - group
        type: string
      title:
        maxLength: 200
        type: string
      type:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
      user_ids:
        description: 直接指定用户ID列表
        items:
          type: integer
        type: array
