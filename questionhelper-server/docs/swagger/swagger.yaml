      target_ids:
        items:
          type: integer
        type: array
      target_type:
        enum:
        - all
        - role
        - class
        - group
        type: string
      title:
        maxLength: 200
        type: string
      type:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
    required:
    - channel
    - content
    - scheduled_at
    - target_type
    - title
    - type
