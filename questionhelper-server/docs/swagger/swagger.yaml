  dto.CreateCommentRequest:
    properties:
      content:
        maxLength: 500
        type: string
      images:
        type: string
      mentions:
        type: string
      parent_id:
        type: integer
      reply_to_user_id:
        type: integer
      target_id:
        type: integer
      target_type:
        enum:
        - 1
        - 2
        - 3
        type: integer
    required:
    - content
    - target_id
    - target_type
    type: object
  dto.CreateCorrectionRequest:
    properties:
      correction_type:
