        type: string
    type: object
  dto.AuditRuleInfo:
    properties:
      action:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      pattern:
        type: string
      priority:
        type: integer
      rule_type:
        type: string
      status:
        type: integer
      updated_at:
        type: string
    type: object
