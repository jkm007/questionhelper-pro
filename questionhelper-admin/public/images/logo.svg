  <circle cx="19" cy="21" r="6" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="25" x2="29" y2="31" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- H letter -->
  <line x1="33" y1="15" x2="33" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="15" x2="41" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="22" x2="41" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- 题小助 text -->
  <text x="56" y="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="600" fill="#2C3E50">题小助</text>
  <!-- QuestionHelper text -->
  <text x="56" y="40" font-family="SF Pro Display, -apple-system, sans-serif" font-size="8" fill="#909399" letter-spacing="0.5">QuestionHelper</text>
