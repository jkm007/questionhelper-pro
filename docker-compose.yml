version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: questionhelper-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: questionhelper
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - questionhelper-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: questionhelper-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - questionhelper-net

  # 后端服务
  server:
    build:
      context: ./questionhelper-server
      dockerfile: Dockerfile
    container_name: questionhelper-server
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      - GIN_MODE=release
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123456
      - DB_NAME=questionhelper
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./questionhelper-server/config:/app/config
      - ./questionhelper-server/uploads:/app/uploads
    networks:
      - questionhelper-net

  # 前端服务
  admin:
    build:
      context: ./questionhelper-admin
      dockerfile: Dockerfile
    container_name: questionhelper-admin
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - questionhelper-net

volumes:
  mysql_data:
  redis_data:

networks:
  questionhelper-net:
    driver: bridge
