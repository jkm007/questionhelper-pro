<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Body / Face - round shape -->
  <circle cx="256" cy="270" r="130" fill="#FFE4C4"/>

  <!-- Eyes -->
  <ellipse cx="215" cy="245" rx="18" ry="22" fill="#2C3E50"/>
  <ellipse cx="297" cy="245" rx="18" ry="22" fill="#2C3E50"/>
  <!-- Eye highlights -->
  <circle cx="222" cy="238" r="7" fill="white"/>
  <circle cx="304" cy="238" r="7" fill="white"/>

  <!-- Eyebrows -->
  <path d="M195 215 Q215 200 235 215" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <path d="M277 215 Q297 200 317 215" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="256" cy="270" rx="6" ry="8" fill="#E8A87C"/>

  <!-- Smile -->
  <path d="M230 295 Q256 320 282 295" fill="none" stroke="#C0392B" stroke-width="5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="195" cy="285" rx="18" ry="12" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="317" cy="285" rx="18" ry="12" fill="#FFB6C1" opacity="0.5"/>

  <!-- Graduation cap -->
  <polygon points="256,120 156,165 256,200 356,165" fill="#2C3E50"/>
  <rect x="240" y="165" width="32" height="35" fill="#2C3E50"/>
  <polygon points="256,105 246,120 256,118 266,120" fill="#2C3E50"/>
  <!-- Tassel -->
  <line x1="340" y1="165" x2="360" y2="210" stroke="#FFD700" stroke-width="3"/>
  <circle cx="360" cy="215" r="6" fill="#FFD700"/>

  <!-- Left hand waving -->
  <ellipse cx="140" cy="320" rx="22" ry="18" fill="#FFE4C4"/>
  <!-- Fingers -->
  <ellipse cx="125" cy="305" rx="6" ry="12" fill="#FFE4C4" transform="rotate(-20 125 305)"/>
  <ellipse cx="133" cy="300" rx="6" ry="13" fill="#FFE4C4" transform="rotate(-10 133 300)"/>
  <ellipse cx="142" cy="298" rx="6" ry="14" fill="#FFE4C4"/>
  <ellipse cx="151" cy="300" rx="6" ry="13" fill="#FFE4C4" transform="rotate(10 151 300)"/>

  <!-- Right hand holding book -->
  <ellipse cx="370" cy="330" rx="20" ry="16" fill="#FFE4C4"/>
  <!-- Book -->
  <rect x="360" y="310" width="60" height="75" rx="4" fill="#E74C3C"/>
  <line x1="390" y1="310" x2="390" y2="385" stroke="#C0392B" stroke-width="2"/>
  <rect x="367" y="320" width="46" height="4" rx="1" fill="white" opacity="0.6"/>
  <rect x="367" y="330" width="36" height="4" rx="1" fill="white" opacity="0.6"/>

  <!-- Feet -->
  <ellipse cx="220" cy="405" rx="30" ry="15" fill="#2C3E50"/>
  <ellipse cx="292" cy="405" rx="30" ry="15" fill="#2C3E50"/>
</svg>
